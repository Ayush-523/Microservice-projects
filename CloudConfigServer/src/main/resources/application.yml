server:
  port: 8888

spring:
  application:
    name: CLOUD-CONFIG-SERVER

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Ayush-523/microservice-config-repo.git
          clone-on-start: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"