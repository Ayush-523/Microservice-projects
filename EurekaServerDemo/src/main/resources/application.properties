spring.application.name=EurekaServerDemo

# Set the port (8761 is the industry standard for Eureka)
server.port=8761

# Tell the server NOT to register itself as a client
eureka.client.register-with-eureka=false

# Tell the server NOT to fetch registry information from others
eureka.client.fetch-registry=false

# Optional: Hostname configuration
eureka.instance.hostname=localhost
eureka.client.serviceUrl.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/
